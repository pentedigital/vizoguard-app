appId: com.vizoguard.app
productName: Vizoguard
copyright: "Copyright 2026 Vizoguard"

directories:
  output: dist

files:
  - "main.js"
  - "preload.js"
  - "src/**/*"
  - "ui/**/*"
  - "package.json"

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  signingHashAlgorithms: [sha256]
  rfc3161TimeStampServer: http://timestamp.digicert.com

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish:
  provider: generic
  url: https://vizoguard.com/downloads/
