name: Build & Deploy Vizoguard Desktop App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write      # For creating GitHub Releases
  actions: read        # For downloading artifacts

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build-time signing flag
        run: |
          if [ -n "${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}" ]; then
            echo 'module.exports = { signed: true };' > src/build-config.js
          else
            echo 'module.exports = { signed: false };' > src/build-config.js
          fi

      - name: Build macOS dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            unset CSC_LINK CSC_KEY_PASSWORD
          fi
          npm run build:mac -- --publish always

      - name: Upload dmg artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mac-dmg
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          retention-days: 7

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build-time signing flag
        shell: pwsh
        run: |
          $signed = if ($env:WIN_CSC_LINK) { 'true' } else { 'false' }
          "module.exports = { signed: $signed };" | Out-File -FilePath src/build-config.js -Encoding utf8
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12_BASE64 || '' }}

      - name: Build Windows NSIS installer
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12_BASE64 || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrEmpty($env:WIN_CSC_LINK)) {
            Remove-Item Env:\WIN_CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:\WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          }
          npm run build:win -- --publish always

      - name: Upload exe artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: win-exe
          path: |
            dist/*.exe
            dist/latest.yml
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.repository == 'pentedigital/vizoguard-app'
    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download win artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: win-exe
          path: dist/

      - name: List built files
        run: ls -lh dist/

      - name: Copy installers to downloads directory
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          VERSION=$(grep '^version:' dist/latest.yml | awk '{print $2}')
          echo "Deploying version: $VERSION"

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName $VPS_HOST
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

          # Ensure downloads directory exists
          ssh vps "mkdir -p /var/www/vizoguard/downloads/"

          # Copy Mac DMGs (x64 + arm64 separately)
          DMG_X64=$(ls dist/Vizoguard-${VERSION}.dmg 2>/dev/null || ls dist/*-${VERSION}.dmg 2>/dev/null | grep -v arm64 | head -1)
          DMG_ARM=$(ls dist/Vizoguard-${VERSION}-arm64.dmg 2>/dev/null || echo "")
          EXE=$(ls dist/*.exe | head -1)

          if [ -n "$DMG_X64" ]; then
            scp "$DMG_X64" vps:/var/www/vizoguard/downloads/Vizoguard-${VERSION}.dmg
          fi

          if [ -n "$DMG_ARM" ]; then
            scp "$DMG_ARM" vps:/var/www/vizoguard/downloads/Vizoguard-${VERSION}-arm64.dmg
          fi

          # Preserve original filename (with spaces) so latest.yml references match
          scp "$EXE" "vps:/var/www/vizoguard/downloads/Vizoguard Setup ${VERSION}.exe"

          # Copy auto-update feeds
          scp dist/latest-mac.yml dist/latest.yml vps:/var/www/vizoguard/downloads/

          # Update symlinks on server
          ssh vps "
            cd /var/www/vizoguard/downloads/
            ln -sf Vizoguard-${VERSION}.dmg Vizoguard-latest.dmg
            [ -f Vizoguard-${VERSION}-arm64.dmg ] && ln -sf Vizoguard-${VERSION}-arm64.dmg Vizoguard-latest-arm64.dmg || true
            ln -sf 'Vizoguard Setup ${VERSION}.exe' Vizoguard-latest.exe
            ls -lh .
          "

      - name: Notify success
        if: success()
        run: |
          echo "Vizoguard deployed to:"
          echo "  https://vizoguard.com/downloads/Vizoguard-latest.dmg"
          echo "  https://vizoguard.com/downloads/Vizoguard-Setup-latest.exe"
