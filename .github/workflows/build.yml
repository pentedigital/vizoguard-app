name: Build & Deploy Vizoguard Desktop App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            unset CSC_LINK CSC_KEY_PASSWORD
          fi
          npm run build:mac -- --publish always

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          retention-days: 7

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12_BASE64 || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrEmpty($env:WIN_CSC_LINK)) {
            Remove-Item Env:\WIN_CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:\WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          }
          npm run build:win -- --publish always

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: |
            dist/*.exe
            dist/latest.yml
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: ${{ secrets.VPS_HOST != '' && secrets.VPS_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download win artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: dist/

      - name: List built files
        run: ls -lh dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload installers to VPS
        run: |
          VERSION=$(grep '^version:' dist/latest.yml | awk '{print $2}')
          echo "Deploying version: $VERSION"

          # Upload Mac DMGs (x64 + arm64 separately)
          DMG_X64=$(ls dist/Vizoguard-${VERSION}.dmg 2>/dev/null || ls dist/*-${VERSION}.dmg 2>/dev/null | grep -v arm64 | head -1)
          DMG_ARM=$(ls dist/Vizoguard-${VERSION}-arm64.dmg 2>/dev/null || echo "")
          EXE=$(ls dist/*.exe | head -1)

          if [ -n "$DMG_X64" ]; then
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
              "$DMG_X64" root@${{ secrets.VPS_HOST }}:/var/www/vizoguard/downloads/Vizoguard-${VERSION}.dmg
          fi

          if [ -n "$DMG_ARM" ]; then
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
              "$DMG_ARM" root@${{ secrets.VPS_HOST }}:/var/www/vizoguard/downloads/Vizoguard-${VERSION}-arm64.dmg
          fi

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$EXE" root@${{ secrets.VPS_HOST }}:/var/www/vizoguard/downloads/Vizoguard-Setup-${VERSION}.exe

          # Upload auto-update feeds
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            dist/latest-mac.yml dist/latest.yml \
            root@${{ secrets.VPS_HOST }}:/var/www/vizoguard/downloads/

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new root@${{ secrets.VPS_HOST }} \
            "cd /var/www/vizoguard/downloads && \
             cp Vizoguard-${VERSION}.dmg Vizoguard-latest.dmg && \
             [ -f Vizoguard-${VERSION}-arm64.dmg ] && cp Vizoguard-${VERSION}-arm64.dmg Vizoguard-latest-arm64.dmg || true && \
             cp Vizoguard-Setup-${VERSION}.exe Vizoguard-Setup-latest.exe && \
             ls -lh"

      - name: Notify success
        if: success()
        run: |
          echo "Vizoguard deployed to:"
          echo "  https://vizoguard.com/downloads/Vizoguard-latest.dmg"
          echo "  https://vizoguard.com/downloads/Vizoguard-Setup-latest.exe"
