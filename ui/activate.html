<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
  <title>Activate Vizoguard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="titlebar">
  <div class="logo">Vizo<span>guard</span></div>
  <div class="titlebar-controls" id="controls"></div>
</div>

<div class="glass activate-card">
  <div class="shield inactive">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--mist)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>

  <h1>Activate Vizoguard</h1>
  <p>Enter your license key to get started.</p>

  <div class="input-group">
    <label>License Key</label>
    <input type="text" id="license-input" placeholder="VIZO-XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="success-state" id="success-state" style="display: none; text-align: center;">
    <div style="font-size: 48px; color: var(--accent); margin-bottom: 12px;">&#x2713;</div>
    <div style="font-size: 18px; font-weight: 600; color: var(--accent);">Activated!</div>
  </div>

  <button class="btn" id="activate-btn" onclick="activate()">Activate</button>

  <p class="activate-footer">
    Don't have a key? <a href="#" onclick="window.vizoguard.openExternal('https://vizoguard.com/#pricing')">Get one at vizoguard.com</a>
  </p>
</div><!-- .glass.activate-card -->

<script>
  // Show window controls on Windows
  if (window.vizoguard.platform !== 'darwin') {
    var ctrl = document.getElementById('controls');
    var minBtn = document.createElement('button');
    minBtn.className = 'titlebar-btn';
    minBtn.textContent = '\u2212';
    minBtn.addEventListener('click', function() { window.vizoguard.minimize(); });
    var closeBtn = document.createElement('button');
    closeBtn.className = 'titlebar-btn';
    closeBtn.textContent = '\u2715';
    closeBtn.addEventListener('click', function() { window.vizoguard.close(); });
    ctrl.appendChild(minBtn);
    ctrl.appendChild(closeBtn);
  }

  const input = document.getElementById('license-input');
  const btn = document.getElementById('activate-btn');
  const errorMsg = document.getElementById('error-msg');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') activate();
  });

  async function activate() {
    const key = input.value.trim().toUpperCase();
    if (!key) {
      errorMsg.textContent = 'Please enter your license key.';
      return;
    }
    if (!/^VIZO-[0-9A-F]{4}(-[0-9A-F]{4}){3}$/.test(key)) {
      errorMsg.textContent = 'Invalid format. Expected: VIZO-XXXX-XXXX-XXXX-XXXX';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Activating...';
    errorMsg.textContent = '';

    const result = await window.vizoguard.activateLicense(key);

    if (!result.success) {
      errorMsg.textContent = result.error || 'Activation failed. Check your key and try again.';
      btn.disabled = false;
      btn.textContent = 'Activate';
      return;
    }

    // Success — show checkmark, then navigate to dashboard
    btn.style.display = 'none';
    document.querySelector('.input-group').style.display = 'none';
    document.querySelector('.activate-footer').style.display = 'none';
    document.getElementById('success-state').style.display = '';

    setTimeout(function() {
      window.vizoguard.showDashboard().catch(function() {});
    }, 1000);
  }
</script>
</body>
</html>
