<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self'">
  <title>Vizoguard — Expired</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="titlebar">
  <div class="logo">Vizo<span>guard</span></div>
  <div class="titlebar-controls" id="controls"></div>
</div>

<div class="expired-container">
  <div class="shield inactive">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke-width="2"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke-width="2"/>
    </svg>
  </div>

  <h1>Subscription Expired</h1>
  <p>Your Vizoguard Pro license has expired. Renew to restore protection and VPN access.</p>

  <button class="btn" onclick="window.vizoguard.openExternal('https://vizoguard.com/#pricing')">
    Renew at vizoguard.com
  </button>

  <div class="footer-info" style="margin-top: auto;">
    <p>Questions? <a href="#" onclick="window.vizoguard.openExternal('mailto:support@vizoguard.com')">support@vizoguard.com</a></p>
  </div>
</div>

<script>
  if (window.vizoguard.platform !== 'darwin') {
    document.getElementById('controls').innerHTML = `
      <button class="titlebar-btn" onclick="window.vizoguard.minimize()">&#x2212;</button>
      <button class="titlebar-btn" onclick="window.vizoguard.close()">&#x2715;</button>
    `;
  }
</script>
</body>
</html>
